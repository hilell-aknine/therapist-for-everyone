name: Deploy to GitHub Pages

# DISABLED 2026-06-10 (security audit): Vercel is the single production host
# (www.therapist-home.com serves with `Server: Vercel`). This workflow deployed a
# SECOND copy of the site that ignored .vercelignore, so pages unpublished on
# Vercel stayed live on GitHub Pages. Manual trigger kept for emergencies only.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment (exclude sensitive files)
        run: |
          mkdir -p _site
          # Copy public files
          cp -r assets css js pages *.html manifest.json CNAME vercel.json _site/ 2>/dev/null || true
          # Copy docs that should be public (booklets, images)
          mkdir -p _site/docs
          cp -r docs/booklets docs/images docs/master-course _site/docs/ 2>/dev/null || true
          # Remove admin pages + internal docs from deployment
          rm -f _site/pages/admin.html
          rm -f _site/admin_backup.html _site/pages/admin_backup.html
          rm -f _site/DOCUMENTATION.md
          # Remove any accidentally included sensitive files (anywhere in tree)
          find _site -name '.env' -o -name '*.db' -o -name 'CLAUDE.md' -o -name 'DOCUMENTATION.md' -o -name 'admin_backup.html' | xargs rm -f 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
