    <style>
        :root {
            --deep-petrol: #003B46;
            --muted-teal: #00606B;
            --dusty-aqua: #2F8592;
            --frost-white: #E8F1F2;
            --pure-white: #FFFFFF;
            --gold: #D4AF37;
            --gold-light: #e6c65a;
            --gold-glow: rgba(212, 175, 55, 0.3);
        
            /* === Theme Bridge === */
            --frost-white: var(--t-bg);
            --gold: var(--t-gold);
            --gold-light: var(--t-gold-light);
            --gold-glow: var(--t-gold-glow);
        }
        body {
            font-family: 'Heebo', sans-serif;
            background: var(--frost-white);
            color: var(--deep-petrol);
        }
        /* Navbar override */
        nav.brand-nav {
            background: var(--deep-petrol);
            box-shadow: 0 2px 12px rgba(0, 59, 70, 0.15);
        }
        nav.brand-nav a.brand-logo {
            color: var(--gold);
            font-weight: 700;
        }
        nav.brand-nav a.brand-logo i {
            color: var(--gold);
        }
        /* Stepper overrides */
        .step-active {
            background: var(--deep-petrol) !important;
            color: var(--pure-white) !important;
            box-shadow: 0 4px 12px rgba(0, 59, 70, 0.3) !important;
        }
        .step-inactive {
            background: #d1d5db !important;
            color: #6b7280 !important;
        }
        .progress-line-active {
            background: var(--gold) !important;
        }
        /* Cards */
        .brand-card {
            background: var(--pure-white);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 59, 70, 0.08);
            border: 1px solid rgba(0, 59, 70, 0.06);
        }
        /* Searching state */
        .searching-state {
            background: linear-gradient(135deg, rgba(47, 133, 146, 0.08), rgba(0, 59, 70, 0.04));
            border: 1px solid rgba(47, 133, 146, 0.15);
        }
        .searching-state .spin-icon { color: var(--dusty-aqua); }
        .searching-state h3 { color: var(--deep-petrol); }
        .searching-state p { color: var(--muted-teal); }
        /* Match state */
        .match-banner {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }
        .therapist-card {
            border: 1px solid rgba(0, 59, 70, 0.08);
        }
        .therapist-specialty {
            color: var(--dusty-aqua);
        }
        /* Buttons — keep WhatsApp green */
        .btn-whatsapp {
            background: #25D366;
        }
        .btn-whatsapp:hover {
            background: #1da851;
        }
        /* Logout */
        .logout-btn { color: rgba(255,255,255,0.7); }
        .logout-btn:hover { color: #FF6F61; }
    </style>

<body>
    <a class="skip-link" href="#main-content">דלג לתוכן הראשי</a>

    <nav class="brand-nav p-4">

            <a href="index.html" class="brand-logo text-xl flex items-center gap-2">
                <img src="assets/logo.png" alt="בית המטפלים" class="logo-img logo-img--sm" style="vertical-align:middle">
                בית המטפלים
            </a>
            <div class="flex items-center gap-4">
                <span id="user-info" class="text-sm font-medium" style="color: var(--frost-white)"></span>
                <a href="pages/profile.html" class="text-sm font-medium transition" style="color: var(--gold); text-decoration: none; display: flex; align-items: center; gap: 0.3rem;">
                    <i class="fa-solid fa-user-circle"></i>
                    הפרופיל שלי

    <main class="max-w-4xl mx-auto p-6" id="main-content">
        <!-- Progress Stepper -->
        <div class="brand-card p-8 mb-8">
            <h2 class="text-lg font-bold mb-6 text-center">סטטוס הבקשה שלך</h2>
            <div class="flex items-center justify-between relative">
                <div class="absolute top-1/2 left-0 w-full h-1 bg-gray-200 -translate-y-1/2 z-0"></div>
                <div id="line-progress" class="absolute top-1/2 left-0 h-1 progress-line-active -translate-y-1/2 z-0 transition-all duration-500" style="width: 0%"></div>

                <div class="relative z-10 flex flex-col items-center">
                    <div class="w-10 h-10 step-active rounded-full flex items-center justify-center mb-2">1</div>
                    <span class="text-xs font-bold">בקשה התקבלה</span>
                </div>
                <div class="relative z-10 flex flex-col items-center">
                    <div id="step-2" class="w-10 h-10 step-inactive rounded-full flex items-center justify-center mb-2">2</div>
                    <span class="text-xs">בחינת התאמה</span>
                </div>
                <div class="relative z-10 flex flex-col items-center">
                    <div id="step-3" class="w-10 h-10 step-inactive rounded-full flex items-center justify-center mb-2">3</div>
                    <span class="text-xs">נמצא מטפל</span>
                </div>
            </div>
        </div>

        <!-- Searching View (shown when no therapist assigned) -->
        <div id="searching-view" class="searching-state rounded-xl p-8 text-center">
            <div class="animate-spin spin-icon text-4xl mb-4 inline-block">
                <i class="fas fa-circle-notch"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">אנחנו מחפשים לך את המטפל המדויק...</h3>
            <p>הצוות המקצועי שלנו עובר על הפרטים כדי למצוא התאמה מושלמת. זה לוקח בדרך כלל בין 24 ל-48 שעות.</p>
        </div>

        <!-- Match View (shown when therapist is assigned) -->
        <div id="match-view" class="hidden space-y-6">
            <div class="match-banner p-4 rounded-lg flex items-center gap-3">
                <i class="fas fa-check-circle text-2xl"></i>
                <span class="font-bold text-lg">יש לנו התאמה! נמצא עבורך המטפל המתאים ביותר.</span>
            </div>

            <div class="brand-card therapist-card overflow-hidden">
                <div class="md:flex">
                    <div class="md:w-1/3 h-64 md:h-auto flex items-center justify-center" style="background: var(--frost-white)">
                        <i class="fas fa-user-tie text-6xl" style="color: var(--dusty-aqua)"></i>
                    </div>
                    <div class="p-8 md:w-2/3">
                        <h3 id="therapist-name" class="text-2xl font-bold mb-1" style="color: var(--deep-petrol)"></h3>
                        <p id="therapist-specialty" class="therapist-specialty font-medium mb-4"></p>
                        <p id="therapist-bio" class="mb-6" style="color: var(--muted-teal)"></p>
                        <a id="whatsapp-btn" href="#" target="_blank" class="inline-flex items-center gap-2 btn-whatsapp text-white px-6 py-3 rounded-full font-bold transition shadow-md">
                            <i class="fab fa-whatsapp text-xl"></i>
                            פתיחת שיחה בוואטסאפ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-guard.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', async () => {
            // Wait for supabase client to be ready
            await new Promise(r => setTimeout(r, 150));

            const supabase = window.supabaseClient;
            if (!supabase) {
                console.error('Supabase client not initialized');
                // TEMP: Show demo mode without Supabase
                document.getElementById('user-info').textContent = 'שלום, משתמש לדוגמה';
                showDemoMode();
                return;
            }

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                // TEMP: Demo mode - remove this block in production
                document.getElementById('user-info').textContent = 'שלום, משתמש לדוגמה';
                showDemoMode();
                return;
                // window.location.href = 'index.html';
            }

            document.getElementById('user-info').textContent = `שלום, ${user.user_metadata.full_name || 'מטופל'}`;
            loadPatientData(user.id);
        });

        // TEMP: Demo function to show UI without real data
        function showDemoMode() {
            // Show Match View (step 3) with sample therapist
            const line = document.getElementById('line-progress');
            const step2 = document.getElementById('step-2');
            const step3 = document.getElementById('step-3');

            line.style.width = '100%';
            step2.className = "w-10 h-10 step-active rounded-full flex items-center justify-center mb-2";
            step3.className = "w-10 h-10 step-active rounded-full flex items-center justify-center mb-2";

            document.getElementById('searching-view').classList.add('hidden');
            document.getElementById('match-view').classList.remove('hidden');

            // Sample therapist data
            document.getElementById('therapist-name').textContent = 'דנה כהן';
            document.getElementById('therapist-specialty').textContent = 'מטפלת בטראומה ו-PTSD';
            document.getElementById('therapist-bio').textContent = 'מטפלת מוסמכת עם 8 שנות ניסיון בליווי נפגעי טראומה, ניצולי פיגועים ואנשים המתמודדים עם חרדה ודיכאון. מתמחה בשיטות CBT ו-EMDR.';
            document.getElementById('whatsapp-btn').href = 'https://wa.me/972549116092';
        }

        async function loadPatientData(userId) {
            const supabase = window.supabaseClient;

            try {
                // Fetch patient with joined therapist data
                const { data: patient, error } = await supabase
                    .from('patients')
                    .select('*, therapists(*)')
                    .eq('user_id', userId)
                    .single();

                if (error) {
                    console.error('Error fetching patient data:', error);
                    return;
                }

                if (!patient) {
                    console.log('No patient record found');
                    return;
                }

                updateUI(patient);
            } catch (err) {
                console.error('Error loading patient data:', err);
            }
        }

        function updateUI(patient) {
            const line = document.getElementById('line-progress');
            const step2 = document.getElementById('step-2');
            const step3 = document.getElementById('step-3');

            if (patient.assigned_therapist_id && patient.therapists) {
                // Step 3 - Therapist found
                line.style.width = '100%';
                step2.className = "w-10 h-10 step-active rounded-full flex items-center justify-center mb-2";
                step3.className = "w-10 h-10 step-active rounded-full flex items-center justify-center mb-2";

                document.getElementById('searching-view').classList.add('hidden');
                document.getElementById('match-view').classList.remove('hidden');

                const t = patient.therapists;
                document.getElementById('therapist-name').textContent = t.full_name || 'המטפל שלך';
                document.getElementById('therapist-specialty').textContent = t.specialty || 'מטפל מוסמך';
                document.getElementById('therapist-bio').textContent = t.bio || 'מטפל מוסמך בעל ניסיון רב בליווי מטופלים.';

                // Format phone for WhatsApp (remove non-digits, ensure country code)
                let phone = t.phone ? t.phone.replace(/\D/g, '') : '';
                if (phone.startsWith('0')) {
                    phone = '972' + phone.substring(1);
                }
                document.getElementById('whatsapp-btn').href = `https://wa.me/${phone}`;
            } else {
                // Step 2 - Matching in progress
                line.style.width = '50%';
                step2.className = "w-10 h-10 step-active rounded-full flex items-center justify-center mb-2";
            }
        }

        async function logout() {
            if (window.supabaseClient) {
                await window.supabaseClient.auth.signOut();
            }
            window.location.href = 'pages/course-library.html';
        }
    </script>
    <!-- Marketing & Analytics -->
    <script src="js/marketing-tools.js"></script>
</body>
