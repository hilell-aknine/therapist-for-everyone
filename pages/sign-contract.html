<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003B46">
    <meta name="robots" content="noindex, nofollow">
    <title>חתימה על הסכם — בית המטפלים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Heebo', sans-serif; background: #f5f6f8; color: #333; line-height: 1.7; }
        .container { max-width: 700px; margin: 0 auto; padding: 1.5rem; }
        .logo { text-align: center; margin-bottom: 1rem; }
        .logo img { height: 60px; }
        h1 { text-align: center; color: #003B46; font-size: 1.4rem; margin-bottom: 0.3rem; }
        .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .contract-box {
            background: #fff; border: 1px solid #ddd; border-radius: 10px;
            padding: 1.5rem; max-height: 400px; overflow-y: auto;
            font-size: 0.85rem; line-height: 1.9; margin-bottom: 1.5rem;
            scroll-behavior: smooth;
        }
        .contract-box h2 { font-size: 1rem; color: #003B46; margin: 1rem 0 0.3rem; }
        .contract-box p { margin-bottom: 0.5rem; }
        .scroll-hint {
            text-align: center; padding: 0.5rem; background: #FFF3CD;
            border-radius: 6px; font-size: 0.8rem; color: #856404; margin-bottom: 1rem;
            display: none;
        }
        .scroll-hint.show { display: block; }

        .form-section { background: #fff; border-radius: 10px; padding: 1.5rem; border: 2px solid #D4AF37; }
        .form-section h3 { color: #003B46; margin-bottom: 1rem; font-size: 1.1rem; }
        .field { margin-bottom: 0.8rem; }
        .field label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
        .field input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 0.95rem; }
        .field input:focus { outline: none; border-color: #D4AF37; box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }

        .checkboxes { margin: 1rem 0; }
        .check-item { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.5rem; }
        .check-item input { margin-top: 5px; flex-shrink: 0; }
        .check-item label { font-size: 0.85rem; cursor: pointer; }

        .sig-section { margin: 1rem 0; }
        .sig-section label { font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 0.5rem; }
        #sigCanvas { border: 2px solid #ccc; border-radius: 8px; background: #fff; cursor: crosshair; touch-action: none; width: 100%; height: 150px; }
        .sig-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .sig-actions button { padding: 4px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; font-family: inherit; border: 1px solid #ccc; background: #f5f5f5; }

        .submit-btn {
            width: 100%; padding: 14px; background: #D4AF37; color: #003B46; border: none;
            border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            font-family: inherit; margin-top: 1rem; transition: background 0.2s;
        }
        .submit-btn:hover { background: #c9a430; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .success-msg {
            display: none; text-align: center; padding: 2rem; background: #fff;
            border-radius: 10px; border: 2px solid #22c55e;
        }
        .success-msg.show { display: block; }
        .success-msg i { font-size: 3rem; color: #22c55e; display: block; margin-bottom: 1rem; }

        .error-msg { color: #f85149; font-size: 0.85rem; text-align: center; margin-top: 0.5rem; }

        @media (max-width: 480px) {
            .container { padding: 1rem; }
            .contract-box { max-height: 300px; font-size: 0.8rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback" async defer></script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="../assets/logo.png" alt="בית המטפלים">
        </div>
        <h1>הסכם הרשמה והשתתפות</h1>
        <p class="subtitle">תוכנית הכשרת מטפלים שנתית — NLP Practitioner + Master</p>

        <div class="scroll-hint show" id="scrollHint">
            <i class="fa-solid fa-arrow-down"></i> יש לגלול לתחתית ההסכם כדי להמשיך לחתימה
        </div>

        <div class="contract-box" id="contractBox">
            <!-- Contract text injected by JS -->
        </div>

        <div class="form-section" id="formSection" style="opacity:0.5;pointer-events:none;">
            <h3><i class="fa-solid fa-signature" style="color:#D4AF37;margin-left:0.3rem;"></i> חתימה דיגיטלית</h3>

            <div class="field">
                <label>שם מלא *</label>
                <input type="text" id="sigName" required autocomplete="name" placeholder="השם המלא שלך">
            </div>
            <div class="field">
                <label>תעודת זהות *</label>
                <input type="text" id="sigId" required placeholder="מספר ת״ז" dir="ltr" style="text-align:left;">
            </div>
            <div class="field">
                <label>טלפון *</label>
                <input type="tel" id="sigPhone" required placeholder="0541234567" dir="ltr" style="text-align:left;" autocomplete="tel">
            </div>

            <div class="checkboxes">
                <div class="check-item">
                    <input type="checkbox" id="chkRead" required>
                    <label for="chkRead">קראתי את ההסכם במלואו והבנתי אותו</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="chkAge" required>
                    <label for="chkAge">אני מעל גיל 18 וכשיר/ה משפטית</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="chkAgree" required>
                    <label for="chkAgree">אני מסכים/ה לכל תנאי ההסכם</label>
                </div>
            </div>

            <div class="sig-section">
                <label>חתימה *</label>
                <canvas id="sigCanvas"></canvas>
                <div class="sig-actions">
                    <button type="button" onclick="clearSignature()"><i class="fa-solid fa-eraser"></i> נקה</button>
                </div>
            </div>

            <div id="turnstile-container"></div>

            <button class="submit-btn" id="submitBtn" onclick="submitContract()" disabled>
                <i class="fa-solid fa-file-signature"></i> חתום ושלח
            </button>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="success-msg" id="successMsg">
            <i class="fa-solid fa-circle-check"></i>
            <h2>ההסכם נחתם בהצלחה!</h2>
            <p>תודה רבה. ההסכם נשמר במערכת ותקבל/י עותק.</p>
            <p style="margin-top:1rem;font-size:0.85rem;color:#666;">ניתן לסגור את הדף.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
        const sb = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
        const FUNCTIONS_URL = window.SUPABASE_CONFIG.functionsUrl;
        const TURNSTILE_SITE_KEY = window.SUPABASE_CONFIG.turnstileSiteKey;

        // Turnstile invisible widget
        let turnstileWidgetId = null;
        window.onloadTurnstileCallback = function () {
            turnstileWidgetId = turnstile.render('#turnstile-container', {
                sitekey: TURNSTILE_SITE_KEY,
                size: 'invisible',
            });
        };

        function getTurnstileToken() {
            return new Promise((resolve, reject) => {
                if (typeof turnstile === 'undefined' || turnstileWidgetId === null) {
                    resolve(''); // Turnstile not loaded — Edge Function handles gracefully
                    return;
                }
                // Reset and execute
                turnstile.reset(turnstileWidgetId);
                turnstile.execute(turnstileWidgetId, {
                    callback: (token) => resolve(token),
                    'error-callback': () => reject(new Error('Turnstile failed')),
                });
            });
        }

        // Get token from URL: ?token=SUBSCRIPTION_ID
        const urlParams = new URLSearchParams(window.location.search);
        const subToken = urlParams.get('token');

        // === Load contract text ===
        (async function loadContract() {
            try {
                const res = await fetch('../docs/contract-text.html');
                if (res.ok) {
                    document.getElementById('contractBox').innerHTML = await res.text();
                } else {
                    // Fallback: load from storage
                    const { data } = await sb.storage.from('contracts').createSignedUrl('registration-agreement-template.txt', 300);
                    if (data?.signedUrl) {
                        const txt = await (await fetch(data.signedUrl)).text();
                        document.getElementById('contractBox').innerHTML = '<pre style="white-space:pre-wrap;font-family:inherit;">' + txt.replace(/</g,'&lt;') + '</pre>';
                    }
                }
            } catch (e) {
                document.getElementById('contractBox').textContent = 'שגיאה בטעינת ההסכם';
            }
        })();

        // === Scroll tracking ===
        const contractBox = document.getElementById('contractBox');
        contractBox.addEventListener('scroll', () => {
            const atBottom = contractBox.scrollTop + contractBox.clientHeight >= contractBox.scrollHeight - 30;
            if (atBottom) {
                document.getElementById('scrollHint').classList.remove('show');
                document.getElementById('formSection').style.opacity = '1';
                document.getElementById('formSection').style.pointerEvents = '';
            }
        });

        // === Signature canvas ===
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let hasSigned = false;

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#003B46';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }

        canvas.addEventListener('mousedown', e => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', e => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSigned = true; validateForm(); });
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSigned = true; validateForm(); }, { passive: false });
        canvas.addEventListener('touchend', () => isDrawing = false);

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hasSigned = false;
            validateForm();
        }

        // === Form validation ===
        function validateForm() {
            const name = document.getElementById('sigName').value.trim();
            const id = document.getElementById('sigId').value.trim();
            const phone = document.getElementById('sigPhone').value.trim();
            const chk1 = document.getElementById('chkRead').checked;
            const chk2 = document.getElementById('chkAge').checked;
            const chk3 = document.getElementById('chkAgree').checked;

            document.getElementById('submitBtn').disabled = !(name && id && phone && chk1 && chk2 && chk3 && hasSigned);
        }

        document.querySelectorAll('input').forEach(el => el.addEventListener('input', validateForm));
        document.querySelectorAll('input[type=checkbox]').forEach(el => el.addEventListener('change', validateForm));

        // === Submit (via Edge Function) ===
        async function submitContract() {
            const btn = document.getElementById('submitBtn');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> שולח...';
            errEl.textContent = '';

            try {
                const name = document.getElementById('sigName').value.trim();
                const idNumber = document.getElementById('sigId').value.trim();
                const phone = document.getElementById('sigPhone').value.trim();
                const signatureData = canvas.toDataURL('image/png');

                // Get Turnstile token (invisible)
                let turnstileToken = '';
                try { turnstileToken = await getTurnstileToken(); } catch (e) { /* continue */ }

                // Submit through Edge Function
                const res = await fetch(`${FUNCTIONS_URL}/submit-contract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subscription_id: subToken || null,
                        signer_name: name,
                        signer_id_number: idNumber,
                        signer_phone: phone,
                        signature_data: signatureData,
                        turnstileToken: turnstileToken,
                    }),
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.error || 'שגיאה בשמירה');

                // Show success
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successMsg').classList.add('show');
                document.getElementById('contractBox').style.display = 'none';
                document.getElementById('scrollHint').style.display = 'none';

            } catch (err) {
                errEl.textContent = 'שגיאה: ' + err.message;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-file-signature"></i> חתום ושלח';
                // Reset Turnstile for retry
                if (typeof turnstile !== 'undefined' && turnstileWidgetId !== null) {
                    turnstile.reset(turnstileWidgetId);
                }
            }
        }
    </script>
</body>
</html>
