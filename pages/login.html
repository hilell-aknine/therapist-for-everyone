        :root {

        /* iOS / Safari Optimization */
        html { -webkit-text-size-adjust: 100%; }

        .login-container {

            background: var(--card);

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        // ===== Tab Switching =====
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('error-message').classList.remove('show');
            document.getElementById('success-message').classList.remove('show');

            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('login-panel').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('signup-panel').classList.add('active');
            }
        }

        // Check if already logged in (with delay for OAuth token parsing)
        (async function() {
            await new Promise(r => setTimeout(r, 300));
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                await savePendingProfile(session.user);
                await redirectLoggedInUser(session.user);
            }
        })();

        // Safety net: catch OAuth/magic-link redirect
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session?.user) {
                await savePendingProfile(session.user);
                await redirectLoggedInUser(session.user);
            }
        });

        // Save phone/name from signup form (stored in localStorage before magic link)
        async function savePendingProfile(user) {
            const pendingPhone = localStorage.getItem('pending_phone');
            const pendingName = localStorage.getItem('pending_name');
            if (pendingPhone || pendingName) {
                try {
                    const update = {};
                    if (pendingPhone) update.phone = pendingPhone;
                    if (pendingName) update.full_name = pendingName;
                    await supabaseClient.from('profiles').update(update).eq('id', user.id);
                    localStorage.removeItem('pending_phone');
                    localStorage.removeItem('pending_name');
                } catch (e) { /* will be caught by questionnaire */ }
            }
        }

        // Show error
        function showError(text) {
            const el = document.getElementById('error-message');
            document.getElementById('error-text').textContent = text;
            el.classList.add('show');
            document.getElementById('success-message').classList.remove('show');
        }

        // Show success
        function showSuccess(text) {
            const el = document.getElementById('success-message');
            document.getElementById('success-text').textContent = text;
            el.classList.add('show');
            document.getElementById('error-message').classList.remove('show');
        }

        // Set loading state
        function setLoading(btnId, spinnerId, loading, loadingText, defaultText) {
            const btn = document.getElementById(btnId);
            const spinner = document.getElementById(spinnerId);
            const btnText = btn.querySelector('.btn-text');

            btn.disabled = loading;
            spinner.style.display = loading ? 'block' : 'none';
            btnText.textContent = loading ? (loadingText || 'מתחבר...') : (defaultText || 'התחברות');
        }

        // Redirect based on role (or returnUrl if available)
        async function redirectLoggedInUser(user, role) {
            // Check for returnUrl first — send user back where they came from
            const returnUrl = sessionStorage.getItem('returnUrl');
            if (returnUrl) {
                sessionStorage.removeItem('returnUrl');
                window.location.href = returnUrl;
                return;
            }

            // Fetch profile (role + phone)
            let phone = null;
            if (!role) {
                try {
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('role, phone')
                        .eq('id', user.id)
                        .single();
                    role = profile?.role || 'student_lead';
                    phone = profile?.phone || null;
                } catch (err) {
                    role = 'student_lead';
                }
            }

            switch (role) {
                case 'admin':
                    window.location.href = 'admin.html';
                    break;
                case 'therapist':
                    window.location.href = '../therapist-dashboard.html';
                    break;
                case 'patient':
                    window.location.href = '../patient-dashboard.html';
                    break;
                case 'student_lead':
                default:
                    // Check questionnaire + phone completion
                    let questionnaireDone = !!localStorage.getItem('portal_questionnaire_done');
                    if (!questionnaireDone) {
                        // Double-check in DB (localStorage can be cleared on logout)
                        try {
                            const { data: qData } = await supabaseClient
                                .from('portal_questionnaires')
                                .select('id')
                                .eq('user_id', user.id)
                                .limit(1);
                            if (qData && qData.length > 0) {
                                localStorage.setItem('portal_questionnaire_done', 'true');
                                questionnaireDone = true;
                            }
                        } catch (e) { /* let them through on error */ }
                    }

                    // Missing phone OR questionnaire → complete profile
                    if (!phone || !questionnaireDone) {
                        window.location.href = 'portal-questionnaire.html';
                        return;
                    }
                    window.location.href = 'course-library.html';
                    break;
            }
        }

        // Handle LOGIN form (Magic Link — no password)
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value.trim();

            document.getElementById('error-message').classList.remove('show');
            setLoading('login-btn', 'login-spinner', true, 'שולח...', 'שלחו לי קישור');

            try {
                // Check if email exists in profiles first
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('id')
                    .eq('email', email)
                    .maybeSingle();

                if (!profile) {
                    showError('האימייל לא נמצא במערכת — צריך להירשם קודם');
                    setLoading('login-btn', 'login-spinner', false, null, 'שלחו לי קישור');
                    return;
                }

                // Send magic link
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email,
                    options: {
                        emailRedirectTo: 'https://www.therapist-home.com/pages/login.html'
                    }
                });

                if (error) throw error;

                showSuccess('קישור התחברות נשלח למייל! בדקו את תיבת הדואר 📧');
                setLoading('login-btn', 'login-spinner', false, null, 'שלחו לי קישור');

            } catch (error) {
                console.error('Login error:', error);
                showError('שגיאה בשליחת הקישור — נסו שוב');
                setLoading('login-btn', 'login-spinner', false, null, 'שלחו לי קישור');
            }
        });

        // Handle SIGNUP form (Magic Link — no password)
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const phone = document.getElementById('signup-phone').value.trim().replace(/[-\s]/g, '');

            if (!fullName || !email || !phone) {
                showError('נא למלא את כל השדות');
                return;
            }

            // Validate Israeli phone
            if (!/^0[2-9]\d{7,8}$/.test(phone)) {
                showError('נא להזין מספר טלפון ישראלי תקין');
                return;
            }

            document.getElementById('error-message').classList.remove('show');
            setLoading('signup-btn', 'signup-spinner', true, 'נרשם...', 'הרשמה');

            try {
                // Send magic link (signInWithOtp creates user if doesn't exist)
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email,
                    options: {
                        data: { full_name: fullName, phone: phone },
                        emailRedirectTo: 'https://www.therapist-home.com/pages/login.html'
                    }
                });

                if (error) throw error;

                // Save phone+name to profiles (in case trigger doesn't catch it)
                // Use service-role or upsert — this may fail for new users without ID,
                // so we'll also save in the questionnaire step
                showSuccess('קישור הרשמה נשלח למייל! לחצו על הקישור כדי להיכנס 📧');
                setLoading('signup-btn', 'signup-spinner', false, null, 'הרשמה');

                // Store phone temporarily so we can save it after they click the link
                localStorage.setItem('pending_phone', phone);
                localStorage.setItem('pending_name', fullName);

            } catch (error) {
                console.error('Signup error:', error);

                if (error.message.includes('already registered')) {
                    showError('כתובת האימייל כבר רשומה — נסו להתחבר בטאב השמאלי');
                } else {
                    showError('שגיאה בהרשמה — נסו שוב');
                }

                setLoading('signup-btn', 'signup-spinner', false, null, 'הרשמה');
            }
        });

        // Handle Google OAuth
        async function signInWithGoogle() {
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'https://www.therapist-home.com/pages/login.html'
                    }
                });

                if (error) throw error;

            } catch (error) {
                console.error('Google auth error:', error);
                showError('שגיאה בהתחברות עם Google - נסו שוב');
            }
        }
    </script>
