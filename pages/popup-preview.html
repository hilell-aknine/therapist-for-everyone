<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תצוגה מקדימה — Popup Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
    <!-- The REAL portal theme variables + popup chrome, so this preview matches course-library-v2.html exactly -->
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/lms-popups.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-client.js"></script>
    <style>
        /* Preview page chrome (NOT the popup itself) — overrides theme.css body */
        html, body { background: #E8F1F2 !important; }
        body {
            font-family: 'Heebo', sans-serif; margin: 0; padding: 1.5rem 1rem;
            display: flex; flex-direction: column; align-items: center; gap: 1rem;
            color: #003B46; min-height: 100vh; box-sizing: border-box;
        }
        .pv-label { font-size: 0.78rem; color: #00606B; font-weight: 600; }
        /* The "portal stage" — a dark surface so the popup sits in a realistic context */
        .pv-stage {
            width: 100%; max-width: 440px; min-height: 220px;
            background: radial-gradient(120% 120% at 50% 0%, #0c2a2c 0%, #061214 100%);
            border-radius: 16px; padding: 1.5rem; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 48px rgba(0,59,70,0.25); overflow: hidden;
        }
        /* Neutralise fixed positioning so the popup renders inline inside the stage */
        .pv-stage .lms-toast,
        .pv-stage .lms-modal-overlay { position: static !important; inset: auto !important; animation: none !important; }
        .pv-stage .lms-modal-overlay { background: none !important; padding: 0 !important; width: 100%; }
        .pv-stage .lms-toast { animation: none !important; margin: 0 auto; }
        .pv-rules {
            width: 100%; max-width: 440px; background: #fff; border: 1px solid #d6e4e6;
            border-radius: 12px; padding: 1rem 1.2rem; font-size: 0.82rem; color: #00606B;
        }
        .pv-rules h3 { margin: 0 0 0.6rem; font-size: 0.85rem; color: #003B46; }
        .pv-rule-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.3rem 0; border-bottom: 1px solid #eef4f5; }
        .pv-rule-row:last-child { border-bottom: none; }
        .pv-rule-row span:first-child { color: #5a7a80; }
        .pv-rule-row span:last-child { color: #003B46; font-weight: 600; text-align: left; }
        .pv-note { font-size: 0.74rem; color: #8a9ba0; max-width: 440px; text-align: center; line-height: 1.5; }
        .pv-error { color: #c0392b; text-align: center; padding: 2rem; }
        .pv-empty { color: var(--text-muted, #B7C4C2); font-style: italic; }
    </style>
</head>
<body>
    <div class="pv-label">כך הפופאפ נראה ומתנהג בפורטל</div>
    <div class="pv-stage" id="stage">
        <p style="color:rgba(232,241,242,0.6);">טוען...</p>
    </div>
    <div class="pv-rules" id="rules" hidden></div>
    <div class="pv-note" id="note"></div>

    <script>
        const TOASTS = ['top_percentile_v2', 'weekly_streak_v2', 'video_toast', 'share_prompt', 'referral_toast'];
        const TOAST_ICONS = { top_percentile_v2: '🎯', weekly_streak_v2: '🔥', video_toast: '🎬', share_prompt: '💛', referral_toast: '🎉' };
        const AUD = { all: 'כולם', authenticated: 'רשומים', unauthenticated: 'אורחים', free_user: 'רשומים (חינם)', paid_customer: 'משלמים', admin: 'מנהלים' };
        const TRIG = { manual: 'ידני', page_load: 'טעינת עמוד', lesson_complete: 'סיום שיעור', login: 'התחברות', signup: 'הרשמה' };

        function esc(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        function slot(val, fallbackLabel) {
            return val ? esc(val) : `<span class="pv-empty">${fallbackLabel}</span>`;
        }

        (async function () {
            const popupId = new URLSearchParams(location.search).get('popup_id');
            const stage = document.getElementById('stage');
            const rules = document.getElementById('rules');
            const note = document.getElementById('note');

            if (!popupId) { stage.innerHTML = '<div class="pv-error">לא סופק popup_id</div>'; return; }

            let attempts = 0;
            while (!window.supabaseClient && attempts < 50) { await new Promise(r => setTimeout(r, 100)); attempts++; }
            if (!window.supabaseClient) { stage.innerHTML = '<div class="pv-error">Supabase לא נטען</div>'; return; }

            let config;
            try {
                const { data, error } = await window.supabaseClient.from('popup_configs').select('*').eq('popup_id', popupId).single();
                if (error || !data) { stage.innerHTML = '<div class="pv-error">הפופאפ לא נמצא</div>'; return; }
                config = data;
            } catch (e) { stage.innerHTML = '<div class="pv-error">שגיאה בטעינה</div>'; return; }

            const isToast = TOASTS.includes(popupId);

            // Personal popups (engaged_master_offer) may use {{lessons}} / {{name}},
            // filled from the real learner at show time. Showing the raw braces here
            // would make the copy look broken to whoever is editing it, so preview with
            // a sample learner. Override from the URL: &lessons=20&name=מאיה
            const q = new URLSearchParams(location.search);
            const sample = { lessons: q.get('lessons') || '14', name: q.get('name') || 'דוד' };
            const fill = t => String(t || '')
                .replace(/\{\{\s*lessons\s*\}\}/g, sample.lessons)
                .replace(/\{\{\s*name\s*\}\}/g, sample.name);

            const title = fill(config.title);
            const message = fill(config.message);
            const cta = fill(config.cta_text);

            if (isToast) {
                const icon = TOAST_ICONS[popupId] || '🔔';
                stage.innerHTML = `
                    <div class="lms-toast">
                        <button class="lms-toast__close" type="button">×</button>
                        <div class="lms-toast__icon">${icon}</div>
                        <div class="lms-toast__body">
                            <strong>${slot(title, 'כותרת לא הוגדרה')}</strong>
                            <p>${slot(message, 'טקסט לא הוגדר')}</p>
                        </div>
                    </div>`;
            } else {
                stage.innerHTML = `
                    <div class="lms-modal" style="max-width:100%;">
                        <button class="lms-modal__close" type="button">×</button>
                        <div class="lms-modal__head">
                            <h2>${slot(title, 'כותרת לא הוגדרה')}</h2>
                            <p>${slot(message, 'טקסט לא הוגדר')}</p>
                        </div>
                        <div class="lms-modal__body">
                            ${cta ? `<button class="lms-modal__action-btn lms-modal__action-btn--gold" type="button">${esc(cta)}</button>` : '<p class="pv-empty" style="text-align:center;">כפתור לא הוגדר</p>'}
                        </div>
                    </div>`;
            }

            // Gating rules — what actually controls when/who sees it
            const status = config.status || (config.is_active ? 'live' : 'paused');
            const fmtDate = d => d ? new Date(d).toLocaleDateString('he-IL') : '—';
            const rows = [
                ['סוג', isToast ? 'טוסט (פינה תחתונה)' : 'חלון מלא (מודאל)'],
                ['מוצג ל', AUD[config.target_audience] || config.target_audience || 'כולם'],
                ['מתי', TRIG[config.trigger_event] || config.trigger_event || 'ידני'],
                ['אחרי כמה שיעורים', config.trigger_min_lessons > 0 ? config.trigger_min_lessons : 'ללא תנאי'],
                ['סטטוס', status],
                ['מקס׳ ביום', config.max_per_day || '—'],
                ['חלון תזמון', (config.start_date || config.end_date) ? `${fmtDate(config.start_date)} – ${fmtDate(config.end_date)}` : 'תמיד'],
            ];
            rules.innerHTML = `<h3>כללי הצגה</h3>` + rows.map(r => `<div class="pv-rule-row"><span>${r[0]}</span><span>${esc(r[1])}</span></div>`).join('');
            rules.hidden = false;
            if (config.cta_link) note.innerHTML = `הכפתור מוביל אל: <span dir="ltr">${esc(config.cta_link)}</span>`;
        })();
    </script>
</body>
</html>
