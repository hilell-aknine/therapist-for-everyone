<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>LMS Portal · Glass — בית המטפלים</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  html,body{margin:0;padding:0;background:#04161b;color:#fff;font-family:'Heebo',sans-serif;min-height:100vh;}
  *{box-sizing:border-box;}

  /* ==================== VARIATION SWITCHER ==================== */
  .switcher{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    display:flex;align-items:center;justify-content:center;gap:.4rem;
    padding:.55rem;
    background:rgba(4,22,27,.85);
    backdrop-filter:blur(20px) saturate(180%);
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:.75rem;
  }
  .switcher__lbl{color:rgba(255,255,255,.5);font-family:ui-monospace,Consolas,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;margin-inline-end:.5rem;}
  .sw-btn{
    padding:.35rem .75rem;border-radius:8px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.7);font-size:.74rem;font-family:inherit;font-weight:500;
    cursor:pointer;transition:all .2s;
  }
  .sw-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
  .sw-btn.active{background:linear-gradient(135deg,rgba(230,198,90,.55),rgba(212,175,55,.38));color:#1a1205;border-color:rgba(230,198,90,.4);font-weight:600;}
  .sw-sep{width:1px;height:20px;background:rgba(255,255,255,.12);margin:0 .4rem;}

  /* ==================== CANVAS ==================== */
  .canvas{padding-top:50px;min-height:100vh;}
  .frame{display:none;min-height:calc(100vh - 50px);}
  .frame.active{display:block;}
  .mobile-frame{display:none;}
  body.mobile .frame{display:none !important;}
  body.mobile .mobile-frame.active{display:block !important;}

  /* Device mockup for mobile */
  .device-wrap{
    display:flex;align-items:center;justify-content:center;
    padding:2rem 1rem;min-height:calc(100vh - 50px);
    background:radial-gradient(ellipse at center, #0c3138 0%, #04161b 70%);
  }
  .device{
    width:390px;max-width:100%;height:844px;border-radius:44px;
    background:#000;padding:10px;
    box-shadow:0 40px 80px rgba(0,0,0,.5), 0 0 0 2px rgba(255,255,255,.06);
    position:relative;
  }
  .device__inner{width:100%;height:100%;border-radius:34px;overflow:hidden;position:relative;background:#04161b;}
  .device::before{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:110px;height:32px;background:#000;border-radius:20px;z-index:10;}

  /* ==================== SHARED GLASS TOKENS ==================== */
  :root{
    --petrol-deep:#04161b;
    --petrol-bg:#062831;
    --petrol-mid:#0a3d48;
    --petrol-hi:#15525d;
    --teal:#2F8592;
    --teal-bright:#3FAABB;
    --gold:#D4AF37;
    --gold-light:#E6C65A;
    --frost:#E8F1F2;

    --g-surface: rgba(255,255,255,.06);
    --g-surface-strong: rgba(255,255,255,.09);
    --g-border: rgba(255,255,255,.14);
    --g-border-bright: rgba(255,255,255,.22);
    --g-top-light: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 45%);
  }

  /* Glass base helper */
  .g{background:var(--g-surface);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid var(--g-border);position:relative;isolation:isolate;}
  .g::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:var(--g-top-light);}

  /* Buttons — reuse the Components · Buttons family */
  .btn{position:relative;display:inline-flex;align-items:center;gap:.45rem;padding:.55rem 1rem;border-radius:10px;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:-.01em;border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);cursor:pointer;text-decoration:none;transition:transform .2s,background .2s;isolation:isolate;overflow:hidden;white-space:nowrap;}
  .btn::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.2) 0%,transparent 50%);}
  .btn:hover{transform:translateY(-1px);}
  .btn--gold{background:linear-gradient(135deg,rgba(230,198,90,.58),rgba(212,175,55,.4));color:#1a1205;box-shadow:0 8px 22px rgba(212,175,55,.3),inset 0 0 0 1px rgba(255,255,255,.2);}
  .btn--gold:hover{background:linear-gradient(135deg,rgba(230,198,90,.72),rgba(212,175,55,.52));}
  .btn--clear{background:rgba(255,255,255,.08);color:#fff;}
  .btn--clear:hover{background:rgba(255,255,255,.16);}
  .btn--teal{background:linear-gradient(135deg,rgba(47,133,146,.5),rgba(0,96,107,.38));color:#e8f8fa;}
  .btn--dark{background:rgba(6,26,32,.6);color:#fff;border-color:rgba(255,255,255,.1);}
  .btn--icon{padding:.55rem .65rem;border-radius:50%;}
  .btn--sm{padding:.35rem .7rem;font-size:.72rem;border-radius:8px;}

  /* ==================== ATMOSPHERIC BG LAYERS ==================== */
  .atmos{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .atmos__base{position:absolute;inset:0;background:
    radial-gradient(ellipse at 15% 10%,rgba(212,175,55,.14),transparent 55%),
    radial-gradient(ellipse at 85% 90%,rgba(47,133,146,.32),transparent 55%),
    linear-gradient(160deg,#041d22 0%,#062831 45%,#0a3d48 100%);}
  .atmos__blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:.3;mix-blend-mode:screen;}
  .atmos__blob--a{width:500px;height:500px;background:#D4AF37;top:-140px;inset-inline-end:-140px;animation:floatA 24s ease-in-out infinite;}
  .atmos__blob--b{width:460px;height:460px;background:#2F8592;bottom:-160px;inset-inline-start:-130px;animation:floatB 30s ease-in-out infinite;}
  @keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}
  @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}}
  .atmos__grain{position:absolute;inset:0;opacity:.04;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/></svg>");}

  /* ==================== FRAME LAYOUTS ==================== */
  .frame{position:relative;isolation:isolate;}
  .frame > .atmos{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:0;}
  .frame > *:not(.atmos){position:relative;z-index:1;}

  @media (prefers-reduced-motion: reduce){
    .atmos__blob{animation:none;}
  }
</style>
</head>
<body>

<!-- ==================== VARIATION SWITCHER ==================== -->
<div class="switcher">
  <span class="switcher__lbl">LMS Portal · Glass</span>
  <button class="sw-btn active" data-v="v1">V1 · מאוזן</button>
  <button class="sw-btn" data-v="v2">V2 · קולנועי</button>
  <button class="sw-btn" data-v="v3">V3 · ציר זמן</button>
  <div class="sw-sep"></div>
  <button class="sw-btn" id="toggleMobile">📱 מובייל</button>
</div>

<div class="canvas" id="canvas"></div>

<!-- ==================== VARIATION TEMPLATES ==================== -->
<template id="tpl-v1"></template>
<template id="tpl-v2"></template>
<template id="tpl-v3"></template>
<template id="tpl-v1-m"></template>
<template id="tpl-v2-m"></template>
<template id="tpl-v3-m"></template>

<script>
  // Switcher logic
  const canvas = document.getElementById('canvas');
  let currentV = 'v1';
  let mobileMode = false;

  function render(){
    document.querySelectorAll('.sw-btn[data-v]').forEach(b=>b.classList.toggle('active', b.dataset.v===currentV));
    document.body.classList.toggle('mobile', mobileMode);
    document.querySelectorAll('.frame, .mobile-frame').forEach(f=>f.classList.remove('active'));
    const target = mobileMode ? document.getElementById(`frame-${currentV}-m`) : document.getElementById(`frame-${currentV}`);
    if(target) target.classList.add('active');
  }

  document.querySelectorAll('.sw-btn[data-v]').forEach(b=>{
    b.addEventListener('click', ()=>{currentV=b.dataset.v;render();});
  });
  document.getElementById('toggleMobile').addEventListener('click',()=>{
    mobileMode=!mobileMode;
    document.getElementById('toggleMobile').classList.toggle('active', mobileMode);
    render();
  });

  window.addEventListener('load', render);
</script>

<!-- Variation modules will be injected here -->
<script src="v1-balanced.js"></script>
<script src="v2-cinematic.js"></script>
<script src="v3-timeline.js"></script>
<script src="mobile-v1-v2.js"></script>
<script src="mobile-v3.js"></script>

</body>
</html>
