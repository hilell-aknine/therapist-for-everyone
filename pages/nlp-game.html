    <style>
        /* Page-level layout overrides */
        .page-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--t-bg-card, #fff);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 150;
            border-bottom: 1px solid var(--t-border, #e5e7eb);
            box-shadow: var(--t-shadow-sm, 0 1px 2px rgba(0,0,0,0.05));
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--t-text, #111);
        }

        .header-brand-icon {
            width: 36px; height: 36px;
            background: var(--t-gradient-gold, linear-gradient(135deg, #D4AF37, #E1B13F));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--t-sidebar-bg, #0a3a42);
        }

        .header-brand-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--t-deep-petrol, #003B46);
        }

        .header-separator {
            width: 1px;
            height: 24px;
            background: var(--t-border, #e5e7eb);
        }

        .header-page-name {
            font-size: 0.9rem;
            color: var(--t-text-secondary, #6b7280);
            font-weight: 500;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .back-to-portal {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--t-gold, #D4AF37);
            background: none;
            border: 1px solid var(--t-border, #e5e7eb);
            padding: 0.45rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            font-family: 'Heebo', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-to-portal:hover {
            background: var(--t-bg-secondary, #f3f4f6);
            border-color: var(--t-gold, #D4AF37);
        }

        .theme-toggle-btn {
            background: none;
            border: 1px solid var(--t-border, #e5e7eb);
            border-radius: 8px;
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            color: var(--t-text-secondary, #6b7280);
            transition: all 0.2s;
        }

        .theme-toggle-btn:hover {
            background: var(--t-bg-secondary, #f3f4f6);
        }

        /* Body offset for fixed page header */
        .page-body {
            padding-top: 64px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--t-deep-petrol, #003B46);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 640px) {
            .page-header {
                padding: 0 1rem;
            }
            .header-brand-text,
            .header-separator,
            .header-page-name {
                display: none;
            }
        }
    </style>

</head>
<body>

    <!-- Page Header -->
    <header class="page-header">
        <div class="header-right">
            <a href="course-library.html" class="header-brand">
                <div class="header-brand-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                <span class="header-brand-text">בית המטפלים</span>
            </a>
            <div class="header-separator"></div>
            <span class="header-page-name">משחק NLP</span>
        </div>
        <div class="header-left">
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="מצב כהה/בהיר">
                <i class="fa-solid fa-moon"></i>
            </button>
            <a href="course-library.html" class="back-to-portal">
                <i class="fa-solid fa-arrow-right"></i>
                חזרה לפורטל
            </a>
        </div>
    </header>

    <!-- Page Body -->
    <div class="page-body">

        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen" style="display: none;">
            <div class="loading-content">
                <div class="loading-spinner-large"></div>
                <p class="loading-text">טוען את המשחק...</p>
            </div>
        </div>

        <!-- Onboarding Overlay -->
        <div id="onboarding-overlay" class="onboarding-overlay" style="display: none;">
            <div class="onboarding-card">
                <button class="onboarding-skip" onclick="game.skipOnboarding()">דלג &larr;</button>
                <div class="onboarding-step" id="onboarding-step-content"></div>
                <div class="onboarding-dots" id="onboarding-dots"></div>
                <button class="btn btn-primary btn-full" id="onboarding-btn" onclick="game.nextOnboardingStep()">הבא</button>
            </div>
        </div>

        <!-- Game Header (stats bar) -->
        <header class="header" id="app-header" style="display: none;">
            <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="logo">🧠 NLP Master</div>
                <div class="stats-bar">
                    <div class="stat-item xp">
                        <span class="icon">⭐</span>
                        <span id="xp-value">0</span>
                    </div>
                    <div class="stat-item streak">
                        <span class="icon">🔥</span>
                        <span id="streak-value">0</span>
                    </div>
                    <div class="stat-item hearts">
                        <div class="hearts-display" id="hearts-container">
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                        </div>
                    </div>
                    <button class="sound-toggle" id="sound-toggle" onclick="game.toggleSound()" title="השתק/הפעל צלילים">
                        🔊
                    </button>
                    <button class="user-menu-btn" id="user-menu-btn" onclick="game.toggleUserMenu()" aria-label="תפריט משתמש">
                        👤
                    </button>
                </div>
            </div>
            <!-- Heart Recovery Timer -->
            <div class="heart-timer-bar" id="heart-timer-bar" style="display: none;">
                <div class="container">
                    <span class="heart-timer-text" id="heart-timer-text">❤️ +1 בעוד 20:00</span>
                    <div class="heart-timer-progress">
                        <div class="heart-timer-fill" id="heart-timer-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- User Menu Dropdown -->
        <div class="user-menu" id="user-menu" style="display: none;">
            <div class="user-menu-email" id="user-menu-email"></div>
            <button class="user-menu-item" onclick="game.showStats()">📊 הסטטיסטיקות שלי</button>
            <button class="user-menu-item" onclick="game.logout()">🚪 התנתקות</button>
        </div>

        <!-- Level Up Overlay -->
        <div class="level-up-overlay" id="level-up-overlay" style="display: none;">
            <div class="level-up-text" id="level-up-text"></div>
        </div>

        <!-- Progress Bar -->
        <div class="container" id="progress-wrapper" style="display: none;">
            <div class="progress-container" id="progress-container" style="display: none;">
                <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="container" id="main-content" style="display: none;">
            <div id="game-container">
                <!-- Dynamic game content renders here -->
            </div>
        </main>

        <!-- Footer Actions -->
        <div class="footer-actions" id="footer-actions" style="display: none;">
            <div class="container">
                <button class="btn btn-secondary" onclick="game.exitLesson()">יציאה</button>
                <button class="btn btn-primary" id="check-btn" disabled onclick="game.checkAnswer()">בדיקה</button>
            </div>
        </div>

        <!-- Feedback Panel -->
        <div class="feedback-panel" id="feedback-panel">
            <div class="feedback-content">
                <div class="feedback-header">
                    <span class="feedback-icon" id="feedback-icon">🎉</span>
                    <span class="feedback-title" id="feedback-title">מעולה!</span>
                </div>
                <div class="feedback-explanation" id="feedback-explanation"></div>
                <button class="feedback-btn" id="feedback-btn" onclick="game.continueToNext()">המשך</button>
            </div>
        </div>

        <!-- Modal -->
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal-content">
                <div class="modal-icon" id="modal-icon">🚪</div>
                <div class="modal-title" id="modal-title"></div>
                <div class="modal-text" id="modal-text"></div>
                <div class="modal-buttons" id="modal-buttons"></div>
            </div>
        </div>

    </div>

    <!-- Ram Chat FAB -->
    <div class="ram-chat-fab" id="ram-chat-fab" onclick="game.toggleRamChat()" style="display:none;">
        <img src="../assets/mentor-ram.png" alt="רם" class="ram-fab-img" />
    </div>

    <!-- Ram Chat Panel -->
    <div class="ram-chat-panel" id="ram-chat-panel" style="display:none;">
        <div class="ram-chat-header">
            <img src="../assets/mentor-ram.png" alt="רם" class="ram-chat-avatar" />
            <div>
                <div class="ram-chat-name">שאל את רם</div>
                <div class="ram-chat-status">מנטור NLP • AI</div>
            </div>
            <button class="ram-chat-close" onclick="game.toggleRamChat()">✕</button>
        </div>
        <div class="ram-chat-messages" id="ram-chat-messages">
            <div class="ram-msg ram-msg-ai">היי! אני רם 🧑‍🏫 שאלו אותי כל שאלה על NLP ואשמח לעזור!</div>
        </div>
        <div class="ram-chat-input-area">
            <input type="text" id="ram-chat-input" class="ram-chat-input" placeholder="שאלו אותי על NLP..." onkeydown="if(event.key==='Enter')game.sendRamChat()" />
            <button class="ram-chat-send" onclick="game.sendRamChat()">➤</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/nlp-game-data.js"></script>
    <script src="../js/nlp-game.js"></script>
    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('beit-theme', next);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const btn = document.getElementById('themeToggleBtn');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        }

        updateThemeIcon();

        // Toast utility
        function showToast(msg, duration) {
            duration = duration || 3000;
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, duration);
        }

        // Check for login_required redirect
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('msg') === 'login_required') {
                showToast('יש להירשם כדי לגשת למשחק');
                history.replaceState(null, '', window.location.pathname);
            }
        })();
    </script>
</body>
